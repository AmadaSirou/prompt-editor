<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptVar v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0b0c10;
    --surface: #111318;
    --surface2: #181b22;
    --border: #222630;
    --border2: #2e3446;
    --accent: #c8f060;
    --teal: #4ae8c8;
    --teal-dim: rgba(74,232,200,0.1);
    --warn: #e87a4a;
    --orange: #f97316;
    --text: #bfc5d4;
    --text-dim: #4a5168;
    --text-bright: #e8ecf4;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 7px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 11px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    color: var(--orange);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .logo-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(200,240,96,0.12);
    border: 1px solid rgba(200,240,96,0.25);
    border-radius: 4px;
    padding: 2px 5px;
    letter-spacing: 0.1em;
    margin-left: -4px;
  }
  .header-sep { color: var(--border2); font-size: 18px; }
  .header-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── Tag Search Bar (full width below header) ── */
  .tag-search-bar {
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tag-search-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tag-search-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .tag-search-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    outline: none;
    width: 220px;
    transition: border-color 0.15s;
  }
  .tag-search-input:focus { border-color: var(--teal); }
  .tag-search-input::placeholder { color: var(--text-dim); font-style: italic; }

  .selected-tags-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 5px;
    min-height: 20px;
  }
  .selected-tag-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
  }
  .sel-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(74,232,200,0.12);
    border: 1px solid rgba(74,232,200,0.3);
    color: var(--teal);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px 2px 8px;
    border-radius: 20px;
    cursor: default;
  }
  .sel-tag .remove-tag {
    cursor: pointer;
    opacity: 0.6;
    font-size: 11px;
    line-height: 1;
    transition: opacity 0.15s;
  }
  .sel-tag .remove-tag:hover { opacity: 1; color: var(--warn); }

  .candidate-tags-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 5px;
    min-height: 16px;
  }
  .cand-tag-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
  }
  .cand-tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .cand-tag:hover {
    border-color: var(--teal);
    color: var(--teal);
    background: var(--teal-dim);
  }
  .no-candidates {
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── Workspace ── */
  .workspace {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left ── */
  .left {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .pane-label {
    padding: 11px 16px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .dot-accent { background: var(--accent); }
  .dot-teal   { background: var(--teal); }
  .dot-orange { background: var(--orange); }

  .var-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .var-list::-webkit-scrollbar { width: 3px; }
  .var-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .var-list-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 40px;
    line-height: 2.2;
  }
  .var-list-empty .hint {
    font-size: 9px;
    letter-spacing: 0.06em;
    opacity: 0.6;
  }

  .var-row {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface2);
    transition: border-color 0.15s;
  }
  .var-row:hover { border-color: var(--border2); }
  .var-row:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 1px rgba(74,232,200,0.12);
  }
  .var-name {
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.04em;
    background: var(--teal-dim);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    max-width: 126px;
    overflow: hidden;
  }
  .var-name span { overflow: hidden; text-overflow: ellipsis; }
  .var-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    min-width: 0;
  }
  .var-input::placeholder { color: var(--text-dim); font-style: italic; }

  .left-actions {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn {
    width: 100%;
    padding: 9px 12px;
    border: none;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-apply { background: var(--accent); color: #0a0c0f; }
  .btn-apply:hover {
    background: #d8f880;
    box-shadow: 0 0 20px rgba(200,240,96,0.22);
    transform: translateY(-1px);
  }
  .btn-apply:active { transform: none; }
  .btn-clear { background: transparent; color: var(--warn); border: 1px solid rgba(232,122,74,0.28); }
  .btn-clear:hover { background: rgba(232,122,74,0.07); border-color: var(--warn); }

  /* ── Right ── */
  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .prompt-section {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    border-bottom: 1px solid var(--border);
  }

  .prompt-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .prompt-topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .var-count {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }
  .var-count strong { color: var(--accent); font-weight: 600; }

  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--teal); color: var(--teal); }

  .save-btn {
    background: var(--orange);
    color: #fff;
    border: none;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .save-btn:hover { background: #ff8a35; transform: translateY(-1px); }
  .save-btn:active { transform: none; }

  /* editing tags inside prompt section */
  .edit-tags-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 5px;
    padding: 7px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    min-height: 36px;
  }
  .edit-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(249,115,22,0.12);
    border: 1px solid rgba(249,115,22,0.3);
    color: var(--orange);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px 2px 8px;
    border-radius: 20px;
  }
  .edit-tag .rm { cursor: pointer; opacity: 0.6; font-size: 11px; }
  .edit-tag .rm:hover { opacity: 1; color: var(--warn); }
  .tag-add-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 10px;
    width: 140px;
  }
  .tag-add-input::placeholder { color: var(--text-dim); font-style: italic; }

  .memo-row {
    padding: 6px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .memo-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .memo-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
  }
  .memo-input::placeholder { color: var(--text-dim); font-style: italic; }

  #promptArea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.85;
    padding: 18px 24px;
    resize: none;
    overflow-y: auto;
    min-height: 80px;
  }
  #promptArea::-webkit-scrollbar { width: 5px; }
  #promptArea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  #promptArea::placeholder { color: var(--text-dim); font-style: italic; }

  /* ── Saved Prompts List ── */
  .saved-section {
    display: flex;
    flex-direction: column;
    height: 230px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .saved-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .saved-count {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .saved-count strong { color: var(--accent); }

  .prompt-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .prompt-list::-webkit-scrollbar { width: 3px; }
  .prompt-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .prompt-card {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .prompt-card:hover { border-color: var(--border2); background: #1a1d27; }
  .prompt-card.active {
    border-color: var(--orange);
    background: rgba(249,115,22,0.06);
  }

  .card-body { flex: 1; min-width: 0; }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 4px;
  }
  .card-tag {
    font-size: 9px;
    font-weight: 600;
    color: var(--teal);
    background: var(--teal-dim);
    border: 1px solid rgba(74,232,200,0.2);
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }
  .card-memo {
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-preview {
    font-size: 10px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0.75;
  }

  .card-delete {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0 2px;
    transition: color 0.15s;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card-delete:hover { color: var(--warn); }

  .saved-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 24px;
    line-height: 2.2;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--accent);
    color: #0a0c0f;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 9px 16px;
    border-radius: 6px;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <span class="logo">PromptVar</span>
  <span class="logo-badge">v2</span>
  <span class="header-sep">|</span>
  <span class="header-sub">LLM Prompt Variable Editor + Manager</span>
</header>

<!-- ── タグ検索バー（全幅） ── -->
<div class="tag-search-bar">
  <div class="tag-search-row">
    <span class="tag-search-label">タグ検索</span>
    <input class="tag-search-input" id="tagSearchInput"
      placeholder="タグを入力して絞り込み..."
      oninput="onTagSearchInput(this.value)">
  </div>
  <div class="selected-tags-row" id="selectedTagsRow">
    <span class="selected-tag-label">選択</span>
  </div>
  <div class="candidate-tags-row" id="candidateTagsRow">
    <span class="cand-tag-label">候補</span>
  </div>
</div>

<!-- ── ワークスペース ── -->
<div class="workspace">

  <!-- 左列: 変数エディタ（既存機能） -->
  <div class="left">
    <div class="pane-label">
      <span class="dot dot-teal"></span>
      Variables
    </div>
    <div class="var-list" id="varList">
      <div class="var-list-empty" id="emptyMsg">
        変数がありません<br>
        <span class="hint">プロンプトに {{変数名}} を入力してください</span>
      </div>
    </div>
    <div class="left-actions">
      <button class="btn btn-apply" onclick="applyVars()">▶&nbsp;&nbsp;変更を適用</button>
      <button class="btn btn-clear" onclick="clearPrompt()">✕&nbsp;&nbsp;プロンプトをクリア</button>
    </div>
  </div>

  <!-- 右列: プロンプトエディタ + 保存リスト -->
  <div class="right">

    <!-- プロンプト編集エリア -->
    <div class="prompt-section">
      <div class="prompt-topbar">
        <div class="prompt-topbar-left">
          <div class="pane-label" style="border:none;padding:0;">
            <span class="dot dot-accent"></span>
            Prompt
          </div>
          <span class="var-count" id="varCount"></span>
        </div>
        <div class="topbar-actions">
          <button class="copy-btn" onclick="copyPrompt()">Copy</button>
          <button class="save-btn" onclick="savePrompt()">+ Save</button>
        </div>
      </div>

      <!-- 編集中タグ行 -->
      <div class="edit-tags-row" id="editTagsRow">
        <input class="tag-add-input" id="tagAddInput"
          placeholder="タグ追加 (Enter / カンマ区切り)"
          onkeydown="onTagAddKeydown(event)">
      </div>

      <!-- メモ行 -->
      <div class="memo-row">
        <span class="memo-label">Memo</span>
        <input class="memo-input" id="memoInput" placeholder="メモ（任意）" type="text">
      </div>

      <!-- プロンプト textarea -->
      <textarea id="promptArea"
        placeholder="ここにプロンプトを貼り付けてください&#10;&#10;【使い方】&#10;1. プロンプトを貼り付ける&#10;2. {{変数名}} 形式の変数が左パネルに自動検出される&#10;3. 値を入力して「変更を適用」で一括置換&#10;4. タグ・メモを入力して「+ Save」で保存&#10;5. 保存済みプロンプトをクリックして再利用&#10;&#10;例: Hello {{name}}, your role is {{role}}."
        oninput="scanVars()"
        onpaste="setTimeout(scanVars, 0)"
      ></textarea>
    </div>

    <!-- 保存済みプロンプトリスト -->
    <div class="saved-section">
      <div class="saved-header">
        <div class="pane-label" style="border:none;padding:0;">
          <span class="dot dot-orange"></span>
          保存済みプロンプト
        </div>
        <span class="saved-count" id="savedCount"></span>
      </div>
      <div class="prompt-list" id="promptList"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===================================================
   STATE
   =================================================== */
const STORAGE_KEY = 'prompt_manager_data';
const MAX_PROMPTS = 100;

let currentVars   = [];   // [{ name, value }]  — 変数エディタ用
let prompts       = [];   // [{ id, tags, memo, prompt }]  — 保存済みプロンプト
let editingId     = null; // 編集中のプロンプトID (nullなら新規)
let editingTags   = [];   // 編集エリアの現在のタグ
let searchTags    = [];   // 絞り込み用の選択済みタグ
let tagSearchText = '';   // タグ検索inputのテキスト

/* ===================================================
   STORAGE — localStorageへの読み書き
   =================================================== */

/** ページロード時にlocalStorageからデータを読み込む */
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) prompts = JSON.parse(raw);
  } catch (e) {
    prompts = [];
  }
}

/** 変更のたびに自動保存 */
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
}

/* ===================================================
   TAG SEARCH BAR — 上部タグ検索バー
   =================================================== */

/** 全プロンプトからユニークなタグ一覧を収集してソート */
function getAllTags() {
  const set = new Set();
  prompts.forEach(p => p.tags.forEach(t => set.add(t)));
  return [...set].sort();
}

/** タグ検索inputへの入力イベント */
function onTagSearchInput(val) {
  tagSearchText = val.toLowerCase();
  renderCandidateTags();
}

/** 候補タグをクリック → 選択済みに追加してリストを絞り込む */
function selectSearchTag(tag) {
  if (!searchTags.includes(tag)) searchTags.push(tag);
  document.getElementById('tagSearchInput').value = '';
  tagSearchText = '';
  renderSelectedTags();
  renderCandidateTags();
  renderPromptList();
}

/** 選択済みタグを削除して絞り込みを更新 */
function removeSearchTag(tag) {
  searchTags = searchTags.filter(t => t !== tag);
  renderSelectedTags();
  renderCandidateTags();
  renderPromptList();
}

/** 選択済みタグ行を再描画 */
function renderSelectedTags() {
  const row = document.getElementById('selectedTagsRow');
  row.innerHTML = '<span class="selected-tag-label">選択</span>';
  if (searchTags.length === 0) {
    const none = document.createElement('span');
    none.style.cssText = 'font-size:10px;color:var(--text-dim);font-style:italic;';
    none.textContent = 'なし';
    row.appendChild(none);
    return;
  }
  searchTags.forEach(tag => {
    const el = document.createElement('span');
    el.className = 'sel-tag';
    el.innerHTML = `${esc(tag)} <span class="remove-tag" onclick="removeSearchTag(${escJs(tag)})">×</span>`;
    row.appendChild(el);
  });
}

/** 候補タグ行を再描画（検索テキストと選択済みでフィルタ） */
function renderCandidateTags() {
  const row = document.getElementById('candidateTagsRow');
  row.innerHTML = '<span class="cand-tag-label">候補</span>';
  const all = getAllTags();
  // 検索テキストを含み、かつ未選択のものを表示
  const filtered = all.filter(t =>
    (tagSearchText === '' || t.includes(tagSearchText)) &&
    !searchTags.includes(t)
  );
  if (filtered.length === 0) {
    const none = document.createElement('span');
    none.className = 'no-candidates';
    none.textContent = tagSearchText ? '候補なし' : '—';
    row.appendChild(none);
    return;
  }
  filtered.slice(0, 40).forEach(tag => {
    const el = document.createElement('span');
    el.className = 'cand-tag';
    el.textContent = tag;
    el.onclick = () => selectSearchTag(tag);
    row.appendChild(el);
  });
}

/* ===================================================
   PROMPT LIST — 保存済みプロンプトリスト
   =================================================== */

/** 保存済みプロンプトリストを再描画（選択タグで絞り込み） */
function renderPromptList() {
  const list  = document.getElementById('promptList');
  const count = document.getElementById('savedCount');

  // 選択タグをすべて含むプロンプトだけを表示
  const filtered = searchTags.length === 0
    ? prompts
    : prompts.filter(p => searchTags.every(t => p.tags.includes(t)));

  count.innerHTML = `<strong>${filtered.length}</strong> / ${prompts.length} 件`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="saved-empty">${
      searchTags.length
        ? 'タグに一致するプロンプトがありません'
        : '保存されたプロンプトはありません'
    }<br><span style="font-size:9px;opacity:0.5;">「+ Save」ボタンで保存できます</span></div>`;
    return;
  }

  list.innerHTML = '';
  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prompt-card' + (editingId === p.id ? ' active' : '');
    card.innerHTML = `
      <div class="card-body">
        <div class="card-tags">${p.tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('')}</div>
        ${p.memo ? `<div class="card-memo">${esc(p.memo)}</div>` : ''}
        <div class="card-preview">${esc(p.prompt)}</div>
      </div>
      <button class="card-delete" title="削除" onclick="event.stopPropagation(); deletePrompt(${p.id})">×</button>
    `;
    card.onclick = () => loadPromptToEditor(p.id);
    list.appendChild(card);
  });
}

/* ===================================================
   PROMPT CRUD
   =================================================== */

/** 現在のエディタ内容を保存（新規 or 上書き） */
function savePrompt() {
  const promptText = document.getElementById('promptArea').value.trim();
  if (!promptText) { showToast('プロンプトが空です'); return; }

  const memo = document.getElementById('memoInput').value.trim();

  if (editingId !== null) {
    // 既存プロンプトの上書き
    const idx = prompts.findIndex(p => p.id === editingId);
    if (idx !== -1) {
      prompts[idx] = { id: editingId, tags: [...editingTags], memo, prompt: promptText };
    }
    showToast('更新しました ✓');
  } else {
    // 新規追加（上限チェック）
    if (prompts.length >= MAX_PROMPTS) {
      showToast(`保存上限 ${MAX_PROMPTS} 件に達しました`);
      return;
    }
    const newId = Date.now();
    prompts.push({ id: newId, tags: [...editingTags], memo, prompt: promptText });
    editingId = newId;
    showToast('保存しました ✓');
  }

  saveData();
  renderPromptList();
  renderCandidateTags();
}

/** カードクリック → エディタにプロンプトを読み込む */
function loadPromptToEditor(id) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  editingId   = p.id;
  editingTags = [...p.tags];
  document.getElementById('promptArea').value = p.prompt;
  document.getElementById('memoInput').value  = p.memo || '';
  scanVars();
  renderEditingTags();
  renderPromptList();
  showToast('読み込みました');
}

/** プロンプトを削除 */
function deletePrompt(id) {
  prompts = prompts.filter(p => p.id !== id);
  if (editingId === id) {
    // 削除したプロンプトを編集中だった場合はリセット
    editingId   = null;
    editingTags = [];
    renderEditingTags();
  }
  saveData();
  renderPromptList();
  renderCandidateTags();
  renderSelectedTags();
  showToast('削除しました');
}

/* ===================================================
   EDITING TAGS — エディタ内タグ操作
   =================================================== */

/** 編集タグ行を再描画 */
function renderEditingTags() {
  const row   = document.getElementById('editTagsRow');
  const input = document.getElementById('tagAddInput');
  row.innerHTML = '';
  editingTags.forEach((tag, i) => {
    const el = document.createElement('span');
    el.className = 'edit-tag';
    el.innerHTML = `${esc(tag)} <span class="rm" onclick="removeEditingTag(${i})">×</span>`;
    row.appendChild(el);
  });
  row.appendChild(input); // inputを末尾に再配置
}

/** 編集タグを削除 */
function removeEditingTag(idx) {
  editingTags.splice(idx, 1);
  renderEditingTags();
}

/** タグをまとめて追加（カンマ区切り対応） */
function addEditingTag(raw) {
  raw.split(',').map(s => s.trim().toLowerCase()).filter(Boolean).forEach(tag => {
    if (!editingTags.includes(tag)) editingTags.push(tag);
  });
  renderEditingTags();
}

/** タグ追加inputのキーダウンイベント */
function onTagAddKeydown(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addEditingTag(e.target.value);
    e.target.value = '';
  }
}

/* ===================================================
   VARIABLE EDITOR — 既存の変数エディタ機能
   =================================================== */

/** プロンプトテキストを走査して {{変数名}} を抽出 */
function scanVars() {
  const prompt = document.getElementById('promptArea').value;
  const regex  = /\{\{([^}]+)\}\}/g;
  const found  = new Set();
  let m;
  while ((m = regex.exec(prompt)) !== null) found.add(m[1].trim());

  const names    = [...found];
  const totalOcc = (prompt.match(/\{\{[^}]+\}\}/g) || []).length;
  updateVarCount(names.length, totalOcc);

  // 既存の入力値を保持しながら更新
  const prev = {};
  currentVars.forEach(v => { prev[v.name] = v.value; });
  currentVars = names.map(name => ({ name, value: prev[name] ?? '' }));
  renderVarList();
}

function updateVarCount(unique) {
  const el = document.getElementById('varCount');
  if (unique === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `変数 <strong>${unique}</strong> 種類`;
}

function renderVarList() {
  const list = document.getElementById('varList');
  if (currentVars.length === 0) {
    list.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'var-list-empty';
    empty.innerHTML = '変数がありません<br><span class="hint">プロンプトに {{変数名}} を入力してください</span>';
    list.appendChild(empty);
    return;
  }
  const focusedVar = document.activeElement?.dataset?.var ?? null;
  list.innerHTML = '';
  currentVars.forEach(v => {
    const row = document.createElement('div');
    row.className = 'var-row';
    row.innerHTML = `
      <div class="var-name" title="${esc(v.name)}"><span>${esc(v.name)}</span></div>
      <input class="var-input" type="text" data-var="${esc(v.name)}"
        value="${esc(v.value)}" placeholder="値を入力..."
        oninput="saveVal(this)">
    `;
    list.appendChild(row);
  });
  if (focusedVar) {
    const el = list.querySelector(`input[data-var="${CSS.escape(focusedVar)}"]`);
    if (el) { el.focus(); const l = el.value.length; el.setSelectionRange(l, l); }
  }
}

function saveVal(input) {
  const v = currentVars.find(x => x.name === input.dataset.var);
  if (v) v.value = input.value;
}

/** 変数を一括置換してプロンプトに適用 */
function applyVars() {
  const ta = document.getElementById('promptArea');
  const original = ta.value;
  if (!original.trim()) { showToast('プロンプトが空です'); return; }
  let result   = original;
  let replaced = 0;
  currentVars.forEach(v => {
    if (!v.value.trim()) return;
    const rx = new RegExp('\\{\\{' + escRx(v.name) + '\\}\\}', 'g');
    const before = result;
    result = result.replace(rx, v.value);
    if (result !== before) replaced++;
  });
  ta.value = result;
  scanVars();
  showToast(replaced > 0 ? `${replaced} 件の変数を適用しました ✓` : '適用できる値がありません');
}

/** プロンプトエリアをクリア（編集状態もリセット） */
function clearPrompt() {
  document.getElementById('promptArea').value = '';
  document.getElementById('memoInput').value  = '';
  currentVars = [];
  editingId   = null;
  editingTags = [];
  renderVarList();
  updateVarCount(0);
  renderEditingTags();
  renderPromptList();
  showToast('クリアしました');
}

function copyPrompt() {
  const text = document.getElementById('promptArea').value;
  if (!text.trim()) { showToast('コピーする内容がありません'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました ✓'));
}

/* ===================================================
   UTILITIES
   =================================================== */

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  clearTimeout(t._tid);
  t.classList.add('show');
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

/** HTML特殊文字をエスケープ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/** JS文字列内のシングルクォートをエスケープ（onclick属性用） */
function escJs(s) {
  return `'${String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'`;
}

/** 正規表現の特殊文字をエスケープ */
function escRx(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* ===================================================
   KEYBOARD SHORTCUTS
   =================================================== */
document.addEventListener('keydown', e => {
  // 変数入力欄でEnter → 変数を適用
  if (e.key === 'Enter' && e.target.matches('.var-input')) {
    e.preventDefault();
    applyVars();
  }
});

/* ===================================================
   INIT
   =================================================== */
loadData();
renderSelectedTags();
renderCandidateTags();
renderPromptList();
renderEditingTags();
</script>
