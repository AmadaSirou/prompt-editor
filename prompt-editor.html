<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Variable Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');

/*
 * カラーパレット（DL用）
 * 以下のいずれかを @import するか、変数をコピーして使用
 * - palette-tech-dark.css   … 信頼感のあるテック系（ダーク）
 * - palette-amber-dark.css  … アンバー系（ダーク）
 * - palette-cyberpunk.css   … サイバーパンク
 */

/**
 * アンバー系（ダークモード）
 * Amber - Dark Mode
 */

:root {
  --bg: #1c1917;
  --surface: #292524;
  --surface2: #44403c;
  --border: #44403c;
  --border2: #57534e;
  --accent: #fbbf24;
  --teal: #f59e0b;
  --teal-dim: rgba(245, 158, 11, 0.12);
  --warn: #f97316;
  --text: #fafaf9;
  --text-dim: #78716c;
  --text-bright: #fef3c7;
}

/* palette-amber-dark.css inlined */

:root {
  /* パレットで色を上書きするため、ここではフォント・余白のみ */
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
  --radius: 7px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 13px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 800;
  color: var(--teal);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.header-sep { color: var(--border2); font-size: 18px; }

.header-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.workspace {
  display: grid;
  grid-template-columns: 300px 1fr;
  flex: 1;
  overflow: hidden;
}

/* ── Left ── */
.left {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
}

.pane-label {
  padding: 11px 16px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot-accent { background: var(--accent); }
.dot-teal   { background: var(--teal); }

.var-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.var-list::-webkit-scrollbar { width: 3px; }
.var-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.var-list-empty {
  text-align: center;
  color: var(--text-dim);
  font-size: 11px;
  margin-top: 40px;
  line-height: 2.2;
}

.var-list-empty .hint {
  font-size: 9px;
  letter-spacing: 0.06em;
  opacity: 0.6;
}

.var-row {
  display: flex;
  align-items: stretch;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface2);
  transition: border-color 0.15s;
}

.var-row:hover { border-color: var(--border2); }
.var-row:focus-within {
  border-color: var(--teal);
  box-shadow: 0 0 0 1px rgba(74,232,200,0.12);
}

.var-name {
  padding: 8px 10px;
  font-size: 10px;
  font-weight: 600;
  color: var(--teal);
  letter-spacing: 0.04em;
  background: var(--teal-dim);
  border-right: 1px solid var(--border);
  white-space: nowrap;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  max-width: 126px;
  overflow: hidden;
}

.var-name span {
  overflow: hidden;
  text-overflow: ellipsis;
}

.var-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-bright);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 10px;
  min-width: 0;
}

.var-input::placeholder { color: var(--text-dim); font-style: italic; }

.left-actions {
  padding: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

.btn {
  width: 100%;
  padding: 9px 12px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-apply {
  background: var(--teal);
  color: #fff;
}
.btn-apply:hover {
  filter: brightness(1.1);
  box-shadow: 0 0 20px color-mix(in srgb, var(--teal) 35%, transparent);
  transform: translateY(-1px);
}
.btn-apply:active { transform: none; }

.btn-clear {
  background: transparent;
  color: var(--warn);
  border: 1px solid rgba(232,122,74,0.28);
}
.btn-clear:hover {
  background: rgba(232,122,74,0.07);
  border-color: var(--warn);
}

/* ── Right ── */
.right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.tagbar {
  padding: 10px 20px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

.tagbar-row1 {
  display: flex;
  align-items: center;
  gap: 8px;
}

.tagbar-sep {
  color: var(--border2);
  font-size: 12px;
  margin: 0 2px;
  user-select: none;
}

.tagbar-file-input {
  position: absolute;
  width: 0;
  height: 0;
  opacity: 0;
  pointer-events: none;
}

.tagname-input {
  flex: 1;
  min-height: 30px;
  max-height: 60px;
  resize: vertical;
  padding: 6px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-bright);
  font-family: var(--mono);
  font-size: 11px;
  outline: none;
}

.tagname-input:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 1px rgba(74,232,200,0.14);
}

.tag-btn {
  padding: 7px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tag-btn:hover {
  border-color: var(--teal);
  color: var(--teal);
}

.tag-btn-danger {
  border-color: rgba(232,122,74,0.5);
  color: var(--warn);
}

.tag-btn-danger:hover {
  border-color: var(--warn);
  background: rgba(232,122,74,0.09);
}

.tagbar-row2 {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag-pill {
  padding: 4px 9px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  max-width: 160px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.15s;
}

.tag-pill:hover {
  border-color: var(--teal);
  color: var(--teal);
}

.tag-pill.active {
  border-color: var(--accent);
  background: rgba(200,240,96,0.1);
  color: var(--accent);
}

.tag-group-header {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 9px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--teal) 45%, var(--border2));
  background: color-mix(in srgb, var(--teal) 12%, var(--surface2));
  color: var(--teal);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  max-width: 180px;
  white-space: nowrap;
  transition: all 0.15s;
  user-select: none;
}

.tag-group-header:hover {
  border-color: var(--teal);
  background: color-mix(in srgb, var(--teal) 18%, var(--surface2));
}

.tag-group-caret {
  flex-shrink: 0;
  font-size: 9px;
}

.tag-group-name {
  overflow: hidden;
  text-overflow: ellipsis;
}

.tag-group-input {
  width: 120px;
  min-width: 0;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text-bright);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
}

.tag-group-sep {
  width: 1px;
  height: 20px;
  margin: 0 4px;
  background: var(--border2);
  opacity: 0.7;
}

.ctx-menu {
  position: fixed;
  z-index: 9999;
  min-width: 180px;
  padding: 5px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: 0 14px 34px rgba(0,0,0,0.35);
}

.ctx-menu.hidden {
  display: none;
}

.ctx-menu-item {
  padding: 7px 9px;
  border-radius: 5px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
}

.ctx-menu-item:hover {
  background: var(--surface2);
  color: var(--teal);
}

.ctx-menu-item.disabled {
  color: var(--text-dim);
  cursor: default;
  opacity: 0.65;
}

.ctx-menu-item.disabled:hover {
  background: transparent;
  color: var(--text-dim);
}

.ctx-menu-sep {
  height: 1px;
  margin: 5px 2px;
  border: none;
  background: var(--border);
}

.prompt-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.prompt-topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.prompt-topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.var-count {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}
.var-count strong { color: var(--accent); font-weight: 600; }

.copy-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.copy-btn:hover { border-color: var(--teal); color: var(--teal); }

#promptArea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.85;
  padding: 22px 24px;
  resize: none;
  overflow-y: auto;
}

#promptArea::-webkit-scrollbar { width: 5px; }
#promptArea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

#promptArea::placeholder {
  color: var(--text-dim);
  font-style: italic;
}

.toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--accent);
  color: #0a0c0f;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 9px 16px;
  border-radius: 6px;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

</style>
</head>
<body>

<header>
  <span class="logo">PromptVar</span>
  <span class="header-sep">|</span>
  <span class="header-sub">LLM Prompt Variable Editor</span>
</header>

<div class="workspace">

  <div class="left">
    <div class="pane-label">
      <span class="dot dot-teal"></span>
      Variables
    </div>
    <div class="var-list" id="varList">
      <div class="var-list-empty" id="emptyMsg">
        変数がありません<br>
        <span class="hint">プロンプトに {{変数名}} を入力してください</span>
      </div>
    </div>
    <div class="left-actions">
      <button class="btn btn-apply" onclick="applyVars()">▶&nbsp;&nbsp;変更を適用</button>
    </div>
  </div>

  <div class="right">
    <div class="tagbar">
      <div class="tagbar-row1">
        <textarea id="tagNameInput" class="tagname-input" rows="1" placeholder="プロンプト名 を入力..."></textarea>
        <span class="tagbar-sep">:</span>
        <button class="tag-btn" type="button" onclick="document.getElementById('importFile').click()">Import</button>
        <button class="tag-btn" type="button" onclick="exportTags()">Export</button>
        <input type="file" id="importFile" class="tagbar-file-input" accept=".json" onchange="importTags(this)">
        <span class="tagbar-sep">|</span>
        <button class="tag-btn" onclick="newGroup()">New Group</button>
        <button class="tag-btn" onclick="saveCurrentPrompt()">Save</button>
        <button class="tag-btn" onclick="newTag()">New</button>
        <button class="tag-btn tag-btn-danger" onclick="deleteTag()">DEL</button>
      </div>
      <div class="tagbar-row2" id="tagList"></div>
    </div>
    <div class="prompt-topbar">
      <div class="prompt-topbar-left">
        <div class="pane-label" style="border:none;padding:0;">
          <span class="dot dot-accent"></span>
          Prompt
        </div>
        <span class="var-count" id="varCount"></span>
      </div>
      <div class="prompt-topbar-actions">
        <button class="copy-btn" type="button" onclick="clearPrompt()">Clear</button>
        <button class="copy-btn" type="button" onclick="copyPrompt()">Copy</button>
      </div>
    </div>
    <textarea id="promptArea"
      placeholder="ここにプロンプトを貼り付けてください&#10;&#10;【このツールについて】&#10;LLMプロンプト内の変数 {{変数名}} を簡単に書き換えるエディタです。&#10;&#10;【使い方】&#10;1. このエリアにプロンプトを貼り付ける&#10;2. {{変数名}} 形式の変数が左パネルに自動検出される&#10;3. 同じ変数名が複数あっても1種類にまとめて管理&#10;4. 左の入力欄に置き換えたい値を入力する&#10;5. 「変更を適用」ボタン（またはEnterキー）で一括置換&#10;6. Copyボタンで完成したプロンプトをクリップボードにコピー&#10;&#10;【グループ管理】&#10;・追加: 「New Group」ボタンでグループを作成&#10;・変更: グループ名をダブルクリックで名前を変更&#10;・削除: グループを右クリック →「削除」（タグは未分類に移動）&#10;・タグを移動: タグを右クリック →「グループに移動」&#10;&#10;例: Hello {{name}}, your role is {{role}}."
      oninput="scanVars()"
      onpaste="setTimeout(scanVars, 0)"
    ></textarea>
  </div>

</div>

<div class="toast" id="toast"></div>
<div id="ctxMenu" class="ctx-menu hidden"></div>

<script>
const STORAGE_KEY = 'promptTags';
const GROUP_STORAGE_KEY = 'promptGroups';
let currentVars = []; // [{ name, value }]
let savedTags = [];   // [{ id, prompt, tagname, updatedAt, groupId }]
let savedGroups = []; // [{ id, name, collapsed }]
let activeTagId = null;
let ungroupedCollapsed = false;

function scanVars() {
  const prompt = document.getElementById('promptArea').value;
  const regex = /\{\{([^}]+)\}\}/g;
  const found = new Set();
  let m;
  while ((m = regex.exec(prompt)) !== null) {
    found.add(m[1].trim());
  }

  const names = [...found];

  // Count total occurrences (including duplicates) for display
  const totalOcc = (prompt.match(/\{\{[^}]+\}\}/g) || []).length;
  updateVarCount(names.length, totalOcc);

  // Preserve existing input values
  const prev = {};
  currentVars.forEach(v => { prev[v.name] = v.value; });

  currentVars = names.map(name => ({
    name,
    value: prev[name] ?? ''
  }));

  renderVarList();
}

function updateVarCount(unique, total) {
  const el = document.getElementById('varCount');
  if (unique === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `変数 <strong>${unique}</strong> 種類`;
}

function renderVarList() {
  const list = document.getElementById('varList');

  if (currentVars.length === 0) {
    list.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'var-list-empty';
    empty.innerHTML = '変数がありません<br><span class="hint">プロンプトに {{変数名}} を入力してください</span>';
    list.appendChild(empty);
    return;
  }

  const focusedVar = document.activeElement?.dataset?.var ?? null;

  list.innerHTML = '';
  currentVars.forEach(v => {
    const row = document.createElement('div');
    row.className = 'var-row';
    row.innerHTML = `
      <div class="var-name" title="${esc(v.name)}"><span>${esc(v.name)}</span></div>
      <input class="var-input" type="text" data-var="${esc(v.name)}"
        value="${esc(v.value)}" placeholder="値を入力..."
        oninput="saveVal(this)">
    `;
    list.appendChild(row);
  });

  if (focusedVar) {
    const el = list.querySelector(`input[data-var="${CSS.escape(focusedVar)}"]`);
    if (el) { el.focus(); const l = el.value.length; el.setSelectionRange(l, l); }
  }
}

function saveVal(input) {
  const v = currentVars.find(x => x.name === input.dataset.var);
  if (v) v.value = input.value;
}

function applyVars() {
  const ta = document.getElementById('promptArea');
  const original = ta.value;
  if (!original.trim()) { showToast('プロンプトが空です'); return; }

  let result = original;
  let replaced = 0;

  currentVars.forEach(v => {
    if (!v.value.trim()) return;
    const rx = new RegExp('\\{\\{' + escRx(v.name) + '\\}\\}', 'g');
    const before = result;
    result = result.replace(rx, v.value);
    if (result !== before) replaced++;
  });

  ta.value = result;
  scanVars();

  showToast(replaced > 0 ? `${replaced} 件の変数を適用しました ✓` : '適用できる値がありません');
}

function clearPrompt() {
  document.getElementById('promptArea').value = '';
  currentVars = [];
  renderVarList();
  updateVarCount(0, 0);
  showToast('クリアしました');
}

function copyPrompt() {
  const text = document.getElementById('promptArea').value;
  if (!text.trim()) { showToast('コピーする内容がありません'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました ✓'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  clearTimeout(t._tid);
  t.classList.add('show');
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escRx(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.matches('.var-input')) {
    e.preventDefault();
    applyVars();
  }
});

function exportTags() {
  const blob = new Blob([JSON.stringify(savedTags, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prompt-tags.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Export しました');
}

function importTags(fileInput) {
  const file = fileInput.files[0];
  fileInput.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error('JSON は配列である必要があります');
      savedTags = data
        .filter(t => t && typeof t === 'object')
        .map(t => ({
          id: t.id ?? Date.now() + Math.random(),
          prompt: String(t.prompt ?? ''),
          tagname: String(t.tagname ?? ''),
          updatedAt: t.updatedAt ?? Date.now(),
          groupId: t.groupId ?? null
        }));
      activeTagId = null;
      persistTags();
      renderTagList();
      showToast(`${savedTags.length} 件を Import しました`);
    } catch (e) {
      showToast('Import に失敗しました');
    }
  };
  reader.readAsText(file);
}

function saveCurrentPrompt() {
  const tagInput = document.getElementById('tagNameInput');
  const tagname = tagInput.value.trim();
  const prompt = document.getElementById('promptArea').value;

  if (!tagname) {
    showToast('プロンプト名 を入力してください');
    tagInput.focus();
    return;
  }
  if (!prompt.trim()) {
    showToast('保存するプロンプトがありません');
    return;
  }

  const now = Date.now();

  // 既存タグを tagname で検索（同じ tagname は1件だけ扱う）
  let tag = savedTags.find(t => t.tagname === tagname);

  if (tag) {
    tag.prompt = prompt;
    tag.tagname = tagname;
    tag.updatedAt = now;
    activeTagId = tag.id;
  } else {
    const id = now;
    tag = { id, prompt, tagname, updatedAt: now, groupId: null };
    savedTags.push(tag);
    activeTagId = id;
  }

  persistTags();
  renderTagList();
  showToast('保存しました ✓');
}

function newTag() {
  activeTagId = null;
  const tagInput = document.getElementById('tagNameInput');
  const promptArea = document.getElementById('promptArea');
  tagInput.value = '';
  promptArea.value = '';
  currentVars = [];
  renderVarList();
  updateVarCount(0, 0);
  tagInput.focus();
  showToast('新しい tagname を作成します');
}

function deleteTag() {
  if (!savedTags.length) {
    showToast('削除できるタグがありません');
    return;
  }

  const tagInput = document.getElementById('tagNameInput');
  const inputName = tagInput.value.trim();

  let targetId = activeTagId;
  if (!targetId && inputName) {
    const found = savedTags.find(t => t.tagname === inputName);
    if (found) targetId = found.id;
  }

  if (!targetId) {
    showToast('削除するタグを選択してください');
    return;
  }

  savedTags = savedTags.filter(t => t.id !== targetId);
  activeTagId = null;
  persistTags();
  renderTagList();

  // 現在の編集内容もクリア
  tagInput.value = '';
  document.getElementById('promptArea').value = '';
  currentVars = [];
  renderVarList();
  updateVarCount(0, 0);

  showToast('タグを削除しました');
}

function renderTagList() {
  const list = document.getElementById('tagList');
  if (!list) return;

  list.innerHTML = '';

  const sortedTags = [...savedTags].sort((a, b) => b.updatedAt - a.updatedAt);

  if (savedGroups.length === 0) {
    sortedTags.forEach(tag => list.appendChild(createTagPill(tag)));
    return;
  }

  const groupIds = new Set(savedGroups.map(group => group.id));
  const ungrouped = sortedTags.filter(tag => tag.groupId === null || !groupIds.has(tag.groupId));
  appendGroupHeader(list, {
    id: null,
    name: '未分類',
    collapsed: ungroupedCollapsed,
    isUngrouped: true
  });
  if (!ungroupedCollapsed) {
    ungrouped.forEach(tag => list.appendChild(createTagPill(tag)));
  }

  savedGroups.forEach(group => {
    list.appendChild(createGroupSeparator());
    appendGroupHeader(list, group);
    if (group.collapsed) return;

    sortedTags
      .filter(tag => tag.groupId === group.id)
      .forEach(tag => list.appendChild(createTagPill(tag)));
  });
}

function createTagPill(tag) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'tag-pill' + (tag.id === activeTagId ? ' active' : '');
  btn.textContent = tag.tagname;
  btn.onclick = () => selectTag(tag.id);
  btn.oncontextmenu = e => {
    e.preventDefault();
    showTagCtxMenu(e, tag);
  };
  return btn;
}

function createGroupSeparator() {
  const sep = document.createElement('span');
  sep.className = 'tag-group-sep';
  return sep;
}

function appendGroupHeader(list, group) {
  const header = document.createElement('span');
  header.className = 'tag-group-header';
  header.dataset.groupId = group.isUngrouped ? '__ungrouped__' : String(group.id);
  header.innerHTML = `<span class="tag-group-caret">${group.collapsed ? '▶' : '▼'}</span><span class="tag-group-name">${esc(group.name)}</span>`;
  header.onclick = e => handleGroupHeaderClick(e, group);
  header.ondblclick = e => {
    e.preventDefault();
    if (header._clickTimer) {
      clearTimeout(header._clickTimer);
      header._clickTimer = null;
    }
    if (!group.isUngrouped) renameGroupInline(header, group.id);
  };
  header.oncontextmenu = e => {
    e.preventDefault();
    if (!group.isUngrouped) showGroupCtxMenu(e, group.id);
  };
  list.appendChild(header);
}

function handleGroupHeaderClick(e, group) {
  const header = e.currentTarget;
  if (header._clickTimer) clearTimeout(header._clickTimer);

  header._clickTimer = setTimeout(() => {
    if (group.isUngrouped) {
      ungroupedCollapsed = !ungroupedCollapsed;
    } else {
      const savedGroup = savedGroups.find(g => g.id === group.id);
      if (savedGroup) {
        savedGroup.collapsed = !savedGroup.collapsed;
        persistGroups();
      }
    }
    renderTagList();
  }, 180);
}

function newGroup() {
  const name = prompt('グループ名を入力してください');
  if (!name || !name.trim()) return;

  const trimmed = name.trim();
  savedGroups.push({ id: Date.now(), name: trimmed, collapsed: false });
  persistGroups();
  renderTagList();
  showToast(`グループ "${trimmed}" を作成しました`);
}

function persistGroups() {
  try {
    localStorage.setItem(GROUP_STORAGE_KEY, JSON.stringify(savedGroups));
  } catch (e) {
    console.error(e);
    showToast('localStorage への保存に失敗しました');
  }
}

function loadGroups() {
  try {
    const raw = localStorage.getItem(GROUP_STORAGE_KEY);
    if (!raw) {
      savedGroups = [];
      return;
    }
    const data = JSON.parse(raw);
    if (Array.isArray(data)) {
      savedGroups = data
        .filter(g => g && typeof g === 'object' && g.id != null)
        .map(g => ({
          id: g.id,
          name: String(g.name ?? ''),
          collapsed: Boolean(g.collapsed)
        }))
        .filter(g => g.name.trim());
    } else {
      savedGroups = [];
    }
  } catch (e) {
    console.error(e);
    savedGroups = [];
  }
}

function showTagCtxMenu(e, tag) {
  const items = [];
  if (tag.groupId !== null) {
    items.push({ label: '未分類に戻す', action: () => moveTagToGroup(tag.id, null) });
  }
  savedGroups.forEach(group => {
    items.push({ label: group.name, action: () => moveTagToGroup(tag.id, group.id) });
  });

  if (!items.length) return;
  showCtxMenu(e, [{ label: 'グループに移動 ▶', action: null }, ...items]);
}

function showGroupCtxMenu(e, groupId) {
  const header = e.currentTarget;
  showCtxMenu(e, [
    { label: '名前を変更', action: () => renameGroupInline(header, groupId) },
    { label: '削除（タグは未分類に移動）', action: () => deleteGroup(groupId) }
  ]);
}

function showCtxMenu(e, items) {
  const menu = document.getElementById('ctxMenu');
  if (!menu) return;

  menu.innerHTML = '';
  items.forEach(item => {
    if (item.separator) {
      const sep = document.createElement('hr');
      sep.className = 'ctx-menu-sep';
      menu.appendChild(sep);
      return;
    }

    const row = document.createElement('div');
    row.className = 'ctx-menu-item' + (!item.action ? ' disabled' : '');
    row.textContent = item.label;
    if (item.action) {
      row.onclick = event => {
        event.stopPropagation();
        hideCtxMenu();
        item.action();
      };
    }
    menu.appendChild(row);
  });

  menu.classList.remove('hidden');
  const x = Math.min(e.clientX, window.innerWidth - menu.offsetWidth - 8);
  const y = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 8);
  menu.style.left = `${Math.max(8, x)}px`;
  menu.style.top = `${Math.max(8, y)}px`;
}

function hideCtxMenu() {
  const menu = document.getElementById('ctxMenu');
  if (menu) menu.classList.add('hidden');
}

function moveTagToGroup(tagId, groupId) {
  const tag = savedTags.find(t => t.id === tagId);
  if (!tag) return;

  tag.groupId = groupId;
  tag.updatedAt = Date.now();
  persistTags();
  renderTagList();
}

function deleteGroup(groupId) {
  savedTags.forEach(tag => {
    if (tag.groupId === groupId) tag.groupId = null;
  });
  savedGroups = savedGroups.filter(group => group.id !== groupId);
  persistTags();
  persistGroups();
  renderTagList();
}

function renameGroupInline(headerEl, groupId) {
  const group = savedGroups.find(g => g.id === groupId);
  if (!group || headerEl.querySelector('input')) return;

  const nameEl = headerEl.querySelector('.tag-group-name');
  if (!nameEl) return;

  const input = document.createElement('input');
  input.className = 'tag-group-input';
  input.type = 'text';
  input.value = group.name;
  nameEl.replaceWith(input);
  input.focus();
  input.select();

  let closed = false;
  const commit = () => {
    if (closed) return;
    closed = true;
    const next = input.value.trim();
    if (next) {
      group.name = next;
      persistGroups();
    }
    renderTagList();
  };

  input.onblur = commit;
  input.onkeydown = e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      commit();
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      renderTagList();
    }
  };
}

function selectTag(id) {
  const tag = savedTags.find(t => t.id === id);
  if (!tag) return;

  activeTagId = id;
  document.getElementById('tagNameInput').value = tag.tagname;
  document.getElementById('promptArea').value = tag.prompt;

  renderTagList();
  scanVars();
  showToast(`"${tag.tagname}" を読み込みました`);
}

function persistTags() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(savedTags));
  } catch (e) {
    console.error(e);
    showToast('localStorage への保存に失敗しました');
  }
}

function loadTags() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      savedTags = [];
      return;
    }
    const data = JSON.parse(raw);
    if (Array.isArray(data)) {
      // 仕様の形式を保証
      savedTags = data
        .filter(t => t && typeof t === 'object')
        .map(t => ({
          id: t.id ?? Date.now(),
          prompt: String(t.prompt ?? ''),
          tagname: String(t.tagname ?? ''),
          updatedAt: t.updatedAt ?? Date.now(),
          groupId: t.groupId ?? null
        }));
    } else {
      savedTags = [];
    }
  } catch (e) {
    console.error(e);
    savedTags = [];
  }
  renderTagList();
}

document.addEventListener('DOMContentLoaded', () => {
  loadGroups();
  loadTags();
});

document.addEventListener('click', e => {
  if (!e.target.closest('#ctxMenu')) hideCtxMenu();
});

</script>
</body>
</html>
