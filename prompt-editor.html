<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Variable Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0b0c10;
    --surface: #111318;
    --surface2: #181b22;
    --border: #222630;
    --border2: #2e3446;
    --accent: #c8f060;
    --teal: #4ae8c8;
    --teal-dim: rgba(74,232,200,0.1);
    --warn: #e87a4a;
    --text: #bfc5d4;
    --text-dim: #4a5168;
    --text-bright: #e8ecf4;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 7px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 13px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    color: #f97316;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .header-sep { color: var(--border2); font-size: 18px; }

  .header-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .workspace {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left ── */
  .left {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .pane-label {
    padding: 11px 16px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .dot-accent { background: var(--accent); }
  .dot-teal   { background: var(--teal); }

  .var-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .var-list::-webkit-scrollbar { width: 3px; }
  .var-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .var-list-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 40px;
    line-height: 2.2;
  }

  .var-list-empty .hint {
    font-size: 9px;
    letter-spacing: 0.06em;
    opacity: 0.6;
  }

  .var-row {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface2);
    transition: border-color 0.15s;
  }

  .var-row:hover { border-color: var(--border2); }
  .var-row:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 1px rgba(74,232,200,0.12);
  }

  .var-name {
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.04em;
    background: var(--teal-dim);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    max-width: 126px;
    overflow: hidden;
  }

  .var-name span {
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .var-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    min-width: 0;
  }

  .var-input::placeholder { color: var(--text-dim); font-style: italic; }

  .left-actions {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn {
    width: 100%;
    padding: 9px 12px;
    border: none;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-apply {
    background: var(--accent);
    color: #0a0c0f;
  }
  .btn-apply:hover {
    background: #d8f880;
    box-shadow: 0 0 20px rgba(200,240,96,0.22);
    transform: translateY(-1px);
  }
  .btn-apply:active { transform: none; }

  .btn-clear {
    background: transparent;
    color: var(--warn);
    border: 1px solid rgba(232,122,74,0.28);
  }
  .btn-clear:hover {
    background: rgba(232,122,74,0.07);
    border-color: var(--warn);
  }

  /* ── Right ── */
  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .prompt-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .prompt-topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .var-count {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }
  .var-count strong { color: var(--accent); font-weight: 600; }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--teal); color: var(--teal); }

  #promptArea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.85;
    padding: 22px 24px;
    resize: none;
    overflow-y: auto;
  }

  #promptArea::-webkit-scrollbar { width: 5px; }
  #promptArea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  #promptArea::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  .toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--accent);
    color: #0a0c0f;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 9px 16px;
    border-radius: 6px;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <span class="logo">PromptVar</span>
  <span class="header-sep">|</span>
  <span class="header-sub">LLM Prompt Variable Editor</span>
</header>

<div class="workspace">

  <div class="left">
    <div class="pane-label">
      <span class="dot dot-teal"></span>
      Variables
    </div>
    <div class="var-list" id="varList">
      <div class="var-list-empty" id="emptyMsg">
        変数がありません<br>
        <span class="hint">プロンプトに {{変数名}} を入力してください</span>
      </div>
    </div>
    <div class="left-actions">
      <button class="btn btn-apply" onclick="applyVars()">▶&nbsp;&nbsp;変更を適用</button>
      <button class="btn btn-clear" onclick="clearPrompt()">✕&nbsp;&nbsp;プロンプトをクリア</button>
    </div>
  </div>

  <div class="right">
    <div class="prompt-topbar">
      <div class="prompt-topbar-left">
        <div class="pane-label" style="border:none;padding:0;">
          <span class="dot dot-accent"></span>
          Prompt
        </div>
        <span class="var-count" id="varCount"></span>
      </div>
      <button class="copy-btn" onclick="copyPrompt()">Copy</button>
    </div>
    <textarea id="promptArea"
      placeholder="ここにプロンプトを貼り付けてください&#10;&#10;【このツールについて】&#10;LLMプロンプト内の変数 {{変数名}} を簡単に書き換えるエディタです。&#10;&#10;【使い方】&#10;1. このエリアにプロンプトを貼り付ける&#10;2. {{変数名}} 形式の変数が左パネルに自動検出される&#10;3. 同じ変数名が複数あっても1種類にまとめて管理&#10;4. 左の入力欄に置き換えたい値を入力する&#10;5. 「変更を適用」ボタン（またはEnterキー）で一括置換&#10;6. Copyボタンで完成したプロンプトをクリップボードにコピー&#10;&#10;例: Hello {{name}}, your role is {{role}}."
      oninput="scanVars()"
      onpaste="setTimeout(scanVars, 0)"
    ></textarea>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentVars = []; // [{ name, value }]

function scanVars() {
  const prompt = document.getElementById('promptArea').value;
  const regex = /\{\{([^}]+)\}\}/g;
  const found = new Set();
  let m;
  while ((m = regex.exec(prompt)) !== null) {
    found.add(m[1].trim());
  }

  const names = [...found];

  // Count total occurrences (including duplicates) for display
  const totalOcc = (prompt.match(/\{\{[^}]+\}\}/g) || []).length;
  updateVarCount(names.length, totalOcc);

  // Preserve existing input values
  const prev = {};
  currentVars.forEach(v => { prev[v.name] = v.value; });

  currentVars = names.map(name => ({
    name,
    value: prev[name] ?? ''
  }));

  renderVarList();
}

function updateVarCount(unique, total) {
  const el = document.getElementById('varCount');
  if (unique === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `変数 <strong>${unique}</strong> 種類`;
}

function renderVarList() {
  const list = document.getElementById('varList');

  if (currentVars.length === 0) {
    list.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'var-list-empty';
    empty.innerHTML = '変数がありません<br><span class="hint">プロンプトに {{変数名}} を入力してください</span>';
    list.appendChild(empty);
    return;
  }

  const focusedVar = document.activeElement?.dataset?.var ?? null;

  list.innerHTML = '';
  currentVars.forEach(v => {
    const row = document.createElement('div');
    row.className = 'var-row';
    row.innerHTML = `
      <div class="var-name" title="${esc(v.name)}"><span>${esc(v.name)}</span></div>
      <input class="var-input" type="text" data-var="${esc(v.name)}"
        value="${esc(v.value)}" placeholder="値を入力..."
        oninput="saveVal(this)">
    `;
    list.appendChild(row);
  });

  if (focusedVar) {
    const el = list.querySelector(`input[data-var="${CSS.escape(focusedVar)}"]`);
    if (el) { el.focus(); const l = el.value.length; el.setSelectionRange(l, l); }
  }
}

function saveVal(input) {
  const v = currentVars.find(x => x.name === input.dataset.var);
  if (v) v.value = input.value;
}

function applyVars() {
  const ta = document.getElementById('promptArea');
  const original = ta.value;
  if (!original.trim()) { showToast('プロンプトが空です'); return; }

  let result = original;
  let replaced = 0;

  currentVars.forEach(v => {
    if (!v.value.trim()) return;
    const rx = new RegExp('\{\{' + escRx(v.name) + '\}\}', 'g');
    const before = result;
    result = result.replace(rx, v.value);
    if (result !== before) replaced++;
  });

  ta.value = result;
  scanVars();

  showToast(replaced > 0 ? `${replaced} 件の変数を適用しました ✓` : '適用できる値がありません');
}

function clearPrompt() {
  document.getElementById('promptArea').value = '';
  currentVars = [];
  renderVarList();
  updateVarCount(0, 0);
  showToast('クリアしました');
}

function copyPrompt() {
  const text = document.getElementById('promptArea').value;
  if (!text.trim()) { showToast('コピーする内容がありません'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました ✓'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  clearTimeout(t._tid);
  t.classList.add('show');
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escRx(s) {
  return s.replace(/[.*+?^${}()|[\\]]/g, '\$&');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.matches('.var-input')) {
    e.preventDefault();
    applyVars();
  }
});
</script>
</body>
</html>
